name: treesbm
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  - pip

  - pip:
    # Deep learning — after env creation, reinstall torch with CUDA:
    #   pip install torch --index-url https://download.pytorch.org/whl/cu121
    - torch>=2.0
    - transformers>=4.30.0

    # Bioinformatics
    - biopython>=1.83
    - ete3>=3.1.3

    # Scientific computing
    - numpy>=1.26.0
    - scipy>=1.14.0

    # Data / utilities
    - pandas>=2.2.0
    - requests>=2.31.0

    # Dev / testing
    - pytest>=7.0.0
